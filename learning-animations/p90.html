<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P90 is Neither Additive Nor Commutative</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; }
    body { word-wrap: break-word; overflow-wrap: break-word; }
    body {
      font-family: 'Fira Code', monospace;
      background: #fafafa;
      color: #2C3E50;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }
    h1 {
      font-size: 1.6rem;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #95A5A6;
      font-size: 0.85rem;
      margin-bottom: 24px;
    }
    p90-explainer {
      max-width: 900px; width: 100%;
      height: 560px; max-width: 100%; overflow: hidden;
      border: 1px solid #ECF0F1;
      border-radius: 12px;
      background: #fff;
      overflow: hidden;
    }
    .hint {
      margin-top: 12px;
      color: #95A5A6;
      font-size: 0.75rem;
    }
  
    @media (max-width: 600px) {
      canvas { max-width: 100% !important; }
      body { padding: 20px 12px; }
      h1 { font-size: 1.2rem; }
      p { font-size: 0.85rem; line-height: 1.5; }
      .hint { font-size: 0.7rem; }
      div[style*="height"] { height: auto !important; min-height: 350px; max-height: 450px; }
    }
  </style>
</head>
<body>
  <h1>P90 is Neither Additive Nor Commutative</h1>
  <p class="subtitle">An interactive explainer — click a tab to explore each property</p>
  <p90-explainer></p90-explainer>
  <p class="hint">Click anywhere on the visualization to replay the animation</p>
  <script src="out/index.js"></script>
</body>
</html>
